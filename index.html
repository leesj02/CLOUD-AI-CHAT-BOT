<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>동아리 AI 채팅</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Noto Sans KR', sans-serif;
      background: #f5f5f0;
      height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    #app {
      width: 100%;
      max-width: 480px;
      height: 100dvh;
      max-height: 800px;
      background: #fff;
      display: flex;
      flex-direction: column;
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 8px 40px rgba(0,0,0,0.12);
    }
    .header {
      padding: 1rem 1.25rem;
      background: #1a1a2e;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .header-icon {
      width: 36px; height: 36px;
      background: rgba(255,255,255,0.15);
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
    }
    .header-icon svg { width: 20px; height: 20px; fill: white; }
    .header-text .title { font-size: 15px; font-weight: 700; color: white; }
    .header-text .sub { font-size: 11px; color: rgba(255,255,255,0.6); margin-top: 1px; }

    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 1.25rem 1rem;
      display: flex;
      flex-direction: column;
      gap: 14px;
      background: #f9f9f6;
    }
    .msg { display: flex; gap: 8px; max-width: 85%; }
    .msg.user { align-self: flex-end; flex-direction: row-reverse; }
    .msg.bot { align-self: flex-start; }
    .bot-icon {
      width: 28px; height: 28px; flex-shrink: 0;
      background: #1a1a2e; border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      margin-top: 2px;
    }
    .bot-icon svg { width: 15px; height: 15px; fill: white; }
    .bubble {
      padding: 10px 14px;
      font-size: 14px;
      line-height: 1.6;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .bot .bubble {
      background: white;
      border: 1px solid #ebebeb;
      border-radius: 4px 16px 16px 16px;
      color: #1a1a2e;
    }
    .user .bubble {
      background: #1a1a2e;
      color: white;
      border-radius: 16px 4px 16px 16px;
    }
    .typing span {
      display: inline-block;
      width: 7px; height: 7px;
      background: #aaa;
      border-radius: 50%;
      margin: 0 2px;
      animation: blink 1.2s infinite;
    }
    .typing span:nth-child(2) { animation-delay: 0.2s; }
    .typing span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes blink { 0%,80%,100%{opacity:0.2} 40%{opacity:1} }

    .input-area {
      padding: 0.75rem 1rem;
      border-top: 1px solid #ebebeb;
      display: flex;
      gap: 8px;
      background: white;
      align-items: flex-end;
    }
    textarea {
      flex: 1;
      border: 1px solid #ddd;
      border-radius: 20px;
      padding: 9px 14px;
      font-size: 14px;
      font-family: inherit;
      resize: none;
      outline: none;
      line-height: 1.5;
      max-height: 120px;
      overflow-y: auto;
      background: #f9f9f6;
    }
    textarea:focus { border-color: #1a1a2e; }
    .send-btn {
      width: 38px; height: 38px; flex-shrink: 0;
      background: #1a1a2e;
      border: none; border-radius: 50%;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: opacity 0.15s;
    }
    .send-btn:hover { opacity: 0.8; }
    .send-btn:disabled { opacity: 0.3; cursor: not-allowed; }
    .send-btn svg { width: 16px; height: 16px; fill: white; }

    @media (max-width: 500px) {
      #app { border-radius: 0; max-height: 100dvh; box-shadow: none; }
      body { background: white; }
    }
  </style>
</head>
<body>
<div id="app">
  <div class="header">
    <div class="header-icon">
      <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 14.5v-9l6 4.5-6 4.5z"/></svg>
    </div>
    <div class="header-text">
      <div class="title">동아리 AI 채팅</div>
      <div class="sub">무엇이든 물어보세요</div>
    </div>
  </div>

  <div class="messages" id="messages">
    <div class="msg bot">
      <div class="bot-icon"><svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 14.5v-9l6 4.5-6 4.5z"/></svg></div>
      <div class="bubble">안녕하세요! 동아리 AI 어시스턴트예요 😊 궁금한 거 뭐든지 물어보세요!</div>
    </div>
  </div>

  <div class="input-area">
    <textarea id="msg-input" placeholder="메시지를 입력하세요..." rows="1"></textarea>
    <button class="send-btn" id="send-btn">
      <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
    </button>
  </div>
</div>

<script>
  const messagesEl = document.getElementById('messages');
  const input = document.getElementById('msg-input');
  const sendBtn = document.getElementById('send-btn');
  let history = [];
  let loading = false;

  function botIcon() {
    return `<div class="bot-icon"><svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 14.5v-9l6 4.5-6 4.5z"/></svg></div>`;
  }

  function addMsg(role, text) {
    const div = document.createElement('div');
    div.className = `msg ${role}`;
    if (role === 'bot') {
      div.innerHTML = `${botIcon()}<div class="bubble">${text}</div>`;
    } else {
      div.innerHTML = `<div class="bubble">${text.replace(/</g, '&lt;')}</div>`;
    }
    messagesEl.appendChild(div);
    messagesEl.scrollTop = messagesEl.scrollHeight;
    return div;
  }

  function showTyping() {
    const div = document.createElement('div');
    div.className = 'msg bot'; div.id = 'typing';
    div.innerHTML = `${botIcon()}<div class="bubble typing"><span></span><span></span><span></span></div>`;
    messagesEl.appendChild(div);
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  async function send() {
    if (loading) return;
    const text = input.value.trim();
    if (!text) return;
    input.value = ''; input.style.height = 'auto';
    loading = true; sendBtn.disabled = true;
    addMsg('user', text);
    history.push({ role: 'user', content: text });
    showTyping();
    try {
      const res = await fetch('/api/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ messages: history }),
      });
      const data = await res.json();
      document.getElementById('typing')?.remove();
      const reply = data.content?.[0]?.text || '오류가 발생했어요. 잠시 후 다시 시도해주세요.';
      history.push({ role: 'assistant', content: reply });
      addMsg('bot', reply.replace(/</g, '&lt;').replace(/\n/g, '<br>'));
    } catch (e) {
      document.getElementById('typing')?.remove();
      addMsg('bot', '네트워크 오류가 발생했어요 😥 잠시 후 다시 시도해주세요.');
    }
    loading = false; sendBtn.disabled = false;
    input.focus();
  }

  sendBtn.addEventListener('click', send);
  input.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
  });
  input.addEventListener('input', () => {
    input.style.height = 'auto';
    input.style.height = input.scrollHeight + 'px';
  });
</script>
</body>
</html>
