<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CLOUD CHAT-BOT</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #ffffff; --bg2: #f7f7f5; --bg3: #efefeb;
      --border: #e8e7e1; --text: #1a1916; --text2: #6b6960; --text3: #9e9d96;
      --accent: #1a1916;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body { font-family: 'DM Sans', 'Noto Sans KR', sans-serif; background: var(--bg2); display: flex; align-items: center; justify-content: center; height: 100dvh; }
    #app { width: 100%; max-width: 520px; height: 100dvh; max-height: 860px; background: var(--bg); display: flex; flex-direction: column; border-radius: 24px; overflow: hidden; border: 1px solid var(--border); }
    .header { padding: 1.1rem 1.4rem; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 11px; background: var(--bg); }
    .header-logo { width: 34px; height: 34px; background: var(--accent); border-radius: 10px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .header-logo svg { width: 17px; height: 17px; fill: white; }
    .header-name { font-size: 14px; font-weight: 600; color: var(--text); letter-spacing: -0.01em; }
    .header-status { display: flex; align-items: center; gap: 5px; font-size: 11px; color: var(--text3); margin-top: 1px; }
    .dot { width: 6px; height: 6px; background: #4ade80; border-radius: 50%; }
    .messages { flex: 1; overflow-y: auto; padding: 1.4rem 1.2rem; display: flex; flex-direction: column; gap: 16px; scroll-behavior: smooth; }
    .messages::-webkit-scrollbar { width: 4px; }
    .messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
    .msg { display: flex; gap: 9px; animation: fadeUp 0.2s ease; }
    @keyframes fadeUp { from { opacity:0; transform: translateY(6px); } to { opacity:1; transform: translateY(0); } }
    .msg.user { flex-direction: row-reverse; align-self: flex-end; max-width: 82%; }
    .msg.bot { align-self: flex-start; max-width: 90%; }
    .bot-avatar { width: 28px; height: 28px; flex-shrink: 0; background: var(--accent); border-radius: 8px; display: flex; align-items: center; justify-content: center; margin-top: 2px; }
    .bot-avatar svg { width: 14px; height: 14px; fill: white; }
    .bubble { padding: 10px 14px; font-size: 14px; line-height: 1.65; word-break: break-word; white-space: pre-wrap; }
    .bot .bubble { background: var(--bg2); border: 1px solid var(--border); color: var(--text); border-radius: 4px 14px 14px 14px; }
    .user .bubble { background: var(--accent); color: white; border-radius: 14px 4px 14px 14px; }
    .file-chip { display: flex; align-items: center; gap: 7px; background: rgba(255,255,255,0.12); border-radius: 8px; padding: 6px 10px; margin-bottom: 5px; font-size: 12px; }
    .bot .file-chip { background: var(--bg3); }
    .file-chip-name { font-weight: 500; max-width: 160px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .img-prev { max-width: 190px; border-radius: 10px; margin-bottom: 6px; display: block; }
    .typing-bubble { display: flex; align-items: center; gap: 4px; padding: 12px 14px; }
    .typing-bubble span { width: 7px; height: 7px; background: var(--text3); border-radius: 50%; animation: bounce 1.2s infinite; }
    .typing-bubble span:nth-child(2) { animation-delay: 0.15s; }
    .typing-bubble span:nth-child(3) { animation-delay: 0.3s; }
    @keyframes bounce { 0%,60%,100%{transform:translateY(0)} 30%{transform:translateY(-5px)} }
    .input-wrapper { border-top: 1px solid var(--border); background: var(--bg); }
    #attach-row { display: none; padding: 0.6rem 1.1rem 0; gap: 6px; flex-wrap: wrap; }
    #attach-row.show { display: flex; }
    .chip { display: flex; align-items: center; gap: 5px; background: var(--bg2); border: 1px solid var(--border); border-radius: 20px; padding: 4px 10px; font-size: 12px; color: var(--text2); }
    .chip span.x { cursor: pointer; color: var(--text3); font-size: 13px; }
    .chip span.x:hover { color: var(--text); }
    .input-area { padding: 0.75rem 1rem; display: flex; align-items: flex-end; gap: 8px; }
    .attach-btn { width: 36px; height: 36px; flex-shrink: 0; background: var(--bg2); border: 1px solid var(--border); border-radius: 10px; cursor: pointer; display: flex; align-items: center; justify-content: center; color: var(--text2); transition: background 0.15s; }
    .attach-btn:hover { background: var(--bg3); }
    .attach-btn svg { width: 16px; height: 16px; }
    textarea { flex: 1; border: 1px solid var(--border); border-radius: 12px; padding: 9px 13px; font-size: 14px; font-family: inherit; resize: none; outline: none; background: var(--bg2); color: var(--text); line-height: 1.5; max-height: 130px; transition: border-color 0.15s, background 0.15s; }
    textarea::placeholder { color: var(--text3); }
    textarea:focus { border-color: var(--accent); background: var(--bg); }
    .send-btn { width: 36px; height: 36px; flex-shrink: 0; background: var(--accent); border: none; border-radius: 10px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: opacity 0.15s, transform 0.1s; }
    .send-btn:hover { opacity: 0.8; }
    .send-btn:active { transform: scale(0.95); }
    .send-btn:disabled { opacity: 0.3; cursor: not-allowed; }
    .send-btn svg { width: 15px; height: 15px; fill: white; }
    @media (max-width: 540px) { #app { border-radius: 0; max-height: 100dvh; border: none; } body { background: white; } }
  </style>
</head>
<body>
<div id="app">
  <div class="header">
    <div class="header-logo">
      <svg viewBox="0 0 24 24"><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2z"/></svg>
    </div>
    <div>
      <div class="header-name">동아리 AI 채팅</div>
      <div class="header-status"><span class="dot"></span>온라인</div>
    </div>
  </div>
  <div class="messages" id="messages">
    <div class="msg bot">
      <div class="bot-avatar"><svg viewBox="0 0 24 24"><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2z"/></svg></div>
      <div class="bubble">안녕하세요! 동아리 AI 어시스턴트예요 😊
궁금한 거 뭐든지 물어보세요!
📎 파일도 첨부 가능해요 — PDF, 이미지, 텍스트, CSV 모두 OK!</div>
    </div>
  </div>
  <div class="input-wrapper">
    <div id="attach-row"></div>
    <div class="input-area">
      <button class="attach-btn" onclick="document.getElementById('file-input').click()" title="파일 첨부">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21.44 11.05l-9.19 9.19a6 6 0 01-8.49-8.49l9.19-9.19a4 4 0 015.66 5.66l-9.2 9.19a2 2 0 01-2.83-2.83l8.49-8.48"/></svg>
      </button>
      <input type="file" id="file-input" style="display:none" multiple accept="image/*,.pdf,.txt,.csv,.xlsx,.xls,.doc,.docx,.json,.md" onchange="onFileSelect(event)" />
      <textarea id="msg-input" placeholder="메시지를 입력하세요..." rows="1"></textarea>
      <button class="send-btn" id="send-btn" onclick="send()">
        <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
      </button>
    </div>
  </div>
</div>
<script>
const msgsEl=document.getElementById('messages'),inp=document.getElementById('msg-input'),sBtn=document.getElementById('send-btn'),attachRow=document.getElementById('attach-row');
let history=[],pending=[],loading=false;
function fIcon(t){if(t.startsWith('image/'))return'🖼️';if(t==='application/pdf')return'📄';if(t.includes('sheet')||t.includes('excel')||t.includes('csv'))return'📊';return'📎';}
function fSize(b){if(b<1024)return b+'B';if(b<1048576)return(b/1024).toFixed(1)+'KB';return(b/1048576).toFixed(1)+'MB';}
function onFileSelect(e){Array.from(e.target.files).forEach(f=>pending.push(f));renderAttach();e.target.value='';}
function removeFile(i){pending.splice(i,1);renderAttach();}
function renderAttach(){if(!pending.length){attachRow.classList.remove('show');attachRow.innerHTML='';return;}attachRow.classList.add('show');attachRow.innerHTML=pending.map((f,i)=>`<div class="chip"><span>${fIcon(f.type)}</span><span style="max-width:140px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${f.name}</span><span class="x" onclick="removeFile(${i})">✕</span></div>`).join('');}
function avatar(){return`<div class="bot-avatar"><svg viewBox="0 0 24 24"><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2z"/></svg></div>`;}
function addBot(html){const d=document.createElement('div');d.className='msg bot';d.innerHTML=`${avatar()}<div class="bubble">${html}</div>`;msgsEl.appendChild(d);msgsEl.scrollTop=msgsEl.scrollHeight;}
function addUser(text,fObjs){const d=document.createElement('div');d.className='msg user';let inner='';fObjs.forEach(f=>{if(f.dataUrl)inner+=`<img class="img-prev" src="${f.dataUrl}"/>`;else inner+=`<div class="file-chip"><span>${fIcon(f.type)}</span><span class="file-chip-name">${f.name}</span><span style="opacity:.5;font-size:11px">${fSize(f.size)}</span></div>`;});if(text)inner+=`<span>${text.replace(/</g,'&lt;').replace(/\n/g,'<br>')}</span>`;d.innerHTML=`<div class="bubble">${inner}</div>`;msgsEl.appendChild(d);msgsEl.scrollTop=msgsEl.scrollHeight;}
function showTyping(){const d=document.createElement('div');d.className='msg bot';d.id='typing';d.innerHTML=`${avatar()}<div class="bubble typing-bubble"><span></span><span></span><span></span></div>`;msgsEl.appendChild(d);msgsEl.scrollTop=msgsEl.scrollHeight;}
async function toB64(f){return new Promise((res,rej)=>{const r=new FileReader();r.onload=()=>res(r.result.split(',')[1]);r.onerror=rej;r.readAsDataURL(f);});}
async function toText(f){return new Promise((res,rej)=>{const r=new FileReader();r.onload=()=>res(r.result);r.onerror=rej;r.readAsText(f);});}
async function toDataUrl(f){return new Promise((res,rej)=>{const r=new FileReader();r.onload=()=>res(r.result);r.onerror=rej;r.readAsDataURL(f);});}
async function buildContent(text,files){const parts=[];for(const f of files){if(f.type.startsWith('image/')){const b64=await toB64(f);parts.push({type:'image',source:{type:'base64',media_type:f.type,data:b64}});}else if(f.type==='application/pdf'){const b64=await toB64(f);parts.push({type:'document',source:{type:'base64',media_type:'application/pdf',data:b64}});}else{try{const t=await toText(f);parts.push({type:'text',text:`[파일: ${f.name}]\n\n${t}`});}catch{parts.push({type:'text',text:`[파일: ${f.name} — 읽기 실패]`});}}}if(text)parts.push({type:'text',text});return parts.length===1&&parts[0].type==='text'?parts[0].text:parts;}
async function send(){if(loading)return;const text=inp.value.trim(),files=[...pending];if(!text&&!files.length)return;inp.value='';inp.style.height='auto';pending=[];renderAttach();loading=true;sBtn.disabled=true;const fObjs=await Promise.all(files.map(async f=>{if(f.type.startsWith('image/')){const dataUrl=await toDataUrl(f);return{name:f.name,type:f.type,size:f.size,dataUrl};}return{name:f.name,type:f.type,size:f.size};}));addUser(text,fObjs);const content=await buildContent(text,files);history.push({role:'user',content});showTyping();try{const res=await fetch('/api/chat',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({messages:history})});const data=await res.json();document.getElementById('typing')?.remove();const reply=data.content?.[0]?.text||'오류가 발생했어요.';history.push({role:'assistant',content:reply});addBot(reply.replace(/</g,'&lt;').replace(/\n/g,'<br>'));}catch{document.getElementById('typing')?.remove();addBot('네트워크 오류가 발생했어요 😥');}loading=false;sBtn.disabled=false;inp.focus();}
sBtn.addEventListener('click',send);
inp.addEventListener('keydown',e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();send();}});
inp.addEventListener('input',()=>{inp.style.height='auto';inp.style.height=Math.min(inp.scrollHeight,130)+'px';});
document.getElementById('app').addEventListener('dragover',e=>e.preventDefault());
document.getElementById('app').addEventListener('drop',e=>{e.preventDefault();Array.from(e.dataTransfer.files).forEach(f=>pending.push(f));renderAttach();});
</script>
</body>
</html>
